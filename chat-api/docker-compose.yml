services:
  chat-api:
    build: .
    container_name: chat-api
    restart: always
    ports:
      - "3099:3001"
    volumes:
      - claude-auth:/root/.claude
    environment:
      - PORT=3001
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://localhost:3005,https://pavankumarny.me,https://www.pavankumarny.me

volumes:
  claude-auth:
